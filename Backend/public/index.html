<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStream | The Ultimate Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #999999;
            --primary: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: #0a0a0a;
            --accent-blue: #0070f3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .nav-links a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: #fff; }

        .auth-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-login {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
        }

        .btn-signup {
            background: #fff;
            color: #000;
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* --- HERO SECTION --- */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 0 80px;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero-content {
            padding-right: 40px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 6rem;
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -4px;
            margin-bottom: 25px;
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* --- INPUT BAR --- */
        .search-container {
            position: relative;
            max-width: 500px;
        }

        .search-bar {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px 18px 50px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-bar:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 1px var(--accent-blue);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* --- HERO IMAGE --- */
        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .hero-img {
            width: 110%;
            max-width: 700px;
            filter: drop-shadow(0 0 50px rgba(255,255,255,0.05));
        }

        /* --- PREVIEW SECTION --- */
        #previewSection {
            display: none;
            padding: 100px 80px;
            background: #050505;
        }

        .preview-card {
            max-width: 900px;
            margin: 0 auto;
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 400px 1fr;
        }

        .preview-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-details {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .preview-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .preview-meta {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .download-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .download-btn:hover { transform: scale(1.02); }

        /* --- LOADER --- */
        .loader-overlay {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            color: #000;
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 700;
            z-index: 2000;
        }

        @media (max-width: 1000px) {
            nav { padding: 20px 30px; }
            .nav-links { display: none; }
            .hero { grid-template-columns: 1fr; padding: 120px 30px; height: auto; text-align: center; }
            .hero-content { padding-right: 0; }
            h1 { font-size: 4rem; letter-spacing: -2px; }
            .search-container { margin: 0 auto; }
            .hero-img { width: 100%; margin-top: 50px; }
            .preview-card { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loader" class="loader-overlay">Analizando video...</div>

    <nav>
        <div class="logo">NexStream</div>
        <div class="nav-links">
            <a href="#">Product</a>
            <a href="#">Teams</a>
            <a href="#">Resources</a>
            <a href="#">Pricing</a>
        </div>
        <div class="auth-buttons">
            <a href="#" class="btn-login">Log in</a>
            <a href="#" class="btn-signup">Get Started</a>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1>Save any video for free.</h1>
            <p>Descarga contenido de alta calidad de cualquier plataforma con un solo clic. Sin anuncios, sin límites.</p>
            
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="2"/>
                    <path d="M14 14L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input type="text" id="urlInput" class="search-bar" placeholder="Pega el enlace del video aquí..." onkeydown="if(event.key==='Enter') analizar()">
            </div>
        </div>
        <div class="hero-visual">
            <img src="nexstream_hero.png" class="hero-img" alt="3D Neon Sphere">
        </div>
    </main>

    <div id="previewSection">
        <div class="preview-card">
            <img id="vidThumb" class="preview-thumb" src="" alt="">
            <div class="preview-details">
                <h2 id="vidTitle" class="preview-title">Título del video</h2>
                <p id="vidMeta" class="preview-meta">Plataforma • 0:00</p>
                
                <select id="formatSelect" style="background:#1a1a1a; color:#fff; border:1px solid #333; padding:12px; border-radius:8px; margin-bottom:20px; outline:none;">
                    <option value="">Mejor Calidad Disponible</option>
                </select>

                <button class="download-btn" onclick="descargar()">Descargar Ahora</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = ''; 

        async function analizar() {
            const url = document.getElementById('urlInput').value.trim();
            const loader = document.getElementById('loader');
            const previewSection = document.getElementById('previewSection');

            if (!url) return;

            loader.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/api/info?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                document.getElementById('vidThumb').src = data.thumbnail;
                document.getElementById('vidTitle').innerText = data.title;
                document.getElementById('vidMeta').innerText = `${data.platform.toUpperCase()} • ${data.duration}`;

                const select = document.getElementById('formatSelect');
                select.innerHTML = '<option value="">Mejor Calidad Disponible</option>';
                data.formats.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.format_id;
                    opt.innerText = `${f.resolution || f.format_id} - MP4`;
                    select.appendChild(opt);
                });

                previewSection.style.display = 'block';
                previewSection.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function descargar() {
            const url = document.getElementById('urlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            window.location.href = `${API_BASE}/api/download?url=${encodeURIComponent(url)}&format=${format}`;
        }
    </script>
</body>
</html>
